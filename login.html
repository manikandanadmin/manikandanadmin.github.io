<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<video autoplay muted loop class="video-bg">
<source src="video/background.mp4">
</video>

<div class="overlay"></div>


<div class="login-card">

<h2>Sign In</h2>

<form id="loginForm">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button type="submit">Login</button>

</form>

<p>
No account?
<a onclick="showRegister()">Register</a>
</p>

</div>


<div class="register-card" id="registerCard">

<h2>Create Account</h2>

<form id="registerForm">

<input id="first" placeholder="First name">
<input id="last" placeholder="Last name">
<input id="regEmail" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address (optional)">
<input id="pincode" placeholder="Pincode">
<input id="regPass" type="password" placeholder="Password">

<button type="submit">Register</button>

</form>

</div>

<script src="js/login.js"></script>

</body>
</html>
